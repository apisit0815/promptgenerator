<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Teacher Assistant | ระบบสร้างสื่อการสอนด้วย RTCF</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3498db; /* สีฟ้า */
            --secondary-color: #2c3e50; /* สีเทาเข้ม */
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #ddd; padding-bottom: 20px; }
        header h1 { color: var(--primary-color); margin-bottom: 10px; font-weight: 600; }
        header p { color: #7f8c8d; }

        .form-section, .output-section { background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .section-title { font-size: 1.2rem; font-weight: 600; color: var(--secondary-color); margin-bottom: 20px; display: flex; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .section-title span { background: #e8f4fd; color: var(--primary-color); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin-left: 10px; }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .input-group { grid-template-columns: 1fr; } }

        label { display: block; font-weight: 600; margin-bottom: 8px; color: #555; font-size: 0.95rem; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #dcdcdc; border-radius: 8px; 
            font-size: 1rem; box-sizing: border-box; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 5px rgba(52,152,219,0.3); }

        .topic-area { grid-column: 1 / -1; margin-top: 20px; }

        .btn-group { text-align: center; margin-top: 30px; }
        .generate-btn { 
            background: var(--primary-color); color: white; border: none; 
            padding: 15px 45px; font-size: 1.2rem; border-radius: 30px; 
            cursor: pointer; font-weight: 600; transition: 0.3s; width: 100%; box-shadow: 0 5px 10px rgba(52,152,219,0.2);
        }
        .generate-btn:hover { background: #2980b9; transform: translateY(-2px); }
        .generate-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        .output-section { display: none; }
        .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .output-badge { background: #e8f4fd; color: var(--primary-color); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        
        #result { background: #fff; padding: 25px; border-left: 6px solid var(--primary-color); border-radius: 8px; white-space: pre-wrap; margin-top: 10px; line-height: 1.8; color: #333; font-size: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        
        .loading { display: none; text-align: center; color: var(--primary-color); font-weight: 600; margin-top: 20px; font-size: 1.1rem; }
        .copy-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .copy-btn { padding: 12px 20px; font-size: 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; text-align: center; }
        .copy-result { background: #27ae60; color: white; }
        .copy-prompt { background: #f39c12; color: white; }
        .copy-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🍎 AI Teacher Prompt Generator</h1>
        <p>สร้างคำสอนและสื่อการสอนอย่างมืออาชีพด้วยระบบ RTCF ง่ายนิดเดียว</p>
    </header>

    <div class="form-section">
        <div class="section-title">🔍 ระบุรายละเอียดเพื่อสร้างพรอมต์ <span>หลักการ RTCF</span></div>
        
        <div class="input-group">
            <div>
                <label>🎭 1. บทบาท (Role)</label>
                <select id="role">
                    <option value="ครูผู้เชี่ยวชาญด้านการสอนและการออกแบบนวัตกรรม">ครูผู้เชี่ยวชาญทั่วไป</option>
                    <option value="ครูวิชาวิทยาศาสตร์และ STEM">ครูสายวิทย์-เทคโนโลยี</option>
                    <option value="ครูวิชาภาษาไทยและวรรณคดี">ครูสายภาษา/สังคม</option>
                    <option value="ที่ปรึกษาด้านการจัดการเรียนรู้นักเรียนระดับประถม">ครูประถม/เด็กเล็ก</option>
                </select>
            </div>
            <div>
                <label>🎯 2. ภารกิจ (Task)</label>
                <select id="task">
                    <option value="สร้างแผนการสอน (Lesson Plan) 1 คาบ">เขียนแผนการสอน</option>
                    <option value="ออกข้อสอบปรนัย 4 ตัวเลือก พร้อมเฉลยอย่างละเอียด">ออกข้อสอบ</option>
                    <option value="ออกแบบกิจกรรม Active Learning">คิดกิจกรรมในห้องเรียน</option>
                    <option value="สรุปเนื้อหาให้เป็นเรื่องเล่าหรือนิทานที่เข้าใจง่าย">สรุปบทเรียน/เรื่องเล่า</option>
                </select>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <label>📚 3. วิชาและระดับชั้น (Context)</label>
            <div class="input-group" style="grid-template-columns: 2fr 1fr;">
                <input type="text" id="subject" placeholder="ระบุวิชา เช่น ประวัติศาสตร์ไทย">
                <input type="text" id="grade" placeholder="ระดับชั้น เช่น ม.3">
            </div>
        </div>

        <div class="topic-area">
            <label>🔎 4. หัวข้อที่ต้องการเน้น (Context Details)</label>
            <textarea id="topic" rows="3" placeholder="ระบุเนื้อหา เช่น การเสียกรุงศรีฯ ครั้งที่ 2, กฎของนิวตัน, บทละครรามเกียรติ์..."></textarea>
        </div>

        <div style="margin-top: 20px;">
            <label>📄 5. รูปแบบผลลัพธ์ (Format)</label>
            <select id="format">
                <option value="ตาราง (Table) ที่แสดงขั้นตอนอย่างชัดเจน">ตาราง (เข้าใจง่าย มีลำดับ)</option>
                <option value="ข้อความบรรยายพร้อมหัวข้อ (Bullet Points)">ข้อความแยกหัวข้อ (Bullet)</option>
                <option value="บทพูดสำหรับคุณครูนำไปสอนต่อได้ทันที">บทพูด/สคริปต์การสอน</option>
                <option value="JSON เพื่อนำไปประมวลผลต่อ">JSON</option>
            </select>
        </div>

        <div class="btn-group">
            <button id="submitBtn" class="generate-btn" onclick="generatePrompt()">🚀 เริ่มสร้างคำตอบด้วย AI</button>
        </div>
    </div>

    <div id="loading" class="loading">⏳ AI กำลังทำงาน... อาจใช้เวลาประมาณ 10-20 วินาที</div>

    <div id="outputSection" class="output-section">
        <div class="output-header">
            <div class="section-title" style="margin-bottom: 0;">✨ ผลลัพธ์จาก AI <span>RTCF Powered</span></div>
        </div>
        <div id="result"></div>
        <div class="copy-btns">
            <button onclick="copyResult()" class="copy-btn copy-result">📋 คัดลอกผลลัพธ์ AI</button>
            <button onclick="copyGeneratedPrompt()" class="copy-btn copy-prompt">🔗 คัดลอกพรอมต์ที่ใช้</button>
        </div>
    </div>
</div>

<script>
    // **ตัวแปรสำหรับเก็บพรอมต์ที่ถูกสร้างขึ้นจริง**
    let generatedPrompt = "";

    async function generatePrompt() {
        // *** ข้อ 1: สำคัญมาก! แก้ไข Web App URL จาก Google Apps Script ที่นี่ ***
        const gasUrl = "https://script.google.com/macros/s/AKfycbypHoNovqO8J344Q0-ZHG5t9RUBGcHfvqHI80JDB4rvnUcLRuMbI2RLWPxQ2f9jb4xB5g/exec"; 
        
        // ตรวจสอบว่าแก้ไข URL หรือยัง
        if(gasUrl.includes("แก้ไข")) {
            alert("⚠️ กรุณาแก้ไข WEB_APP_URL ในโค้ดก่อนใช้งาน!");
            return;
        }

        // 1. ดึงค่าจากฟอร์ม
        const role = document.getElementById('role').value;
        const task = document.getElementById('task').value;
        const subject = document.getElementById('subject').value;
        const grade = document.getElementById('grade').value;
        const topic = document.getElementById('topic').value;
        const format = document.getElementById('format').value;

        // 2. ประกอบพรอมต์ตามหลัก RTCF (เพื่อบันทึกและแสดงผล)
        generatedPrompt = `คุณคือ ${role}
หน้าที่ของคุณคือ ${task}
สำหรับวิชา ${subject} ระดับชั้น ${grade} ในหัวข้อเรื่อง "${topic}" โดยเน้นให้ผู้เรียนเข้าใจง่ายและนำไปใช้ได้จริง
แสดงผลลัพธ์ในรูปแบบ ${format}`;

        // 3. ปรับสถานะ UI เป็นโหลด
        const btn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const outputSection = document.getElementById('outputSection');
        const resultDiv = document.getElementById('result');

        btn.disabled = true;
        btn.innerText = "กำลังประมวลผล...";
        loading.style.display = 'block';
        outputSection.style.display = 'none';

        try {
            // ** ข้อ 2: ปรับปรุงส่วน fetch() เพื่อแก้ปัญหา CORS **
            // ใช้การส่งแบบ GET โดยแนบพรอมต์ผ่าน URL parameter เพื่อความง่ายและเสถียรที่สุดสำหรับ GAS
            const response = await fetch(`${gasUrl}?prompt=${encodeURIComponent(generatedPrompt)}`);

            if (!response.ok) {
                // หาก HTTP Status ไม่ใช่ 200-299
                throw new Error(`การเชื่อมต่อมีปัญหา (${response.status})`);
            }

            const data = await response.json(); // อ่าน response เป็น JSON

            // 4. แสดงผลลัพธ์
            if (data.choices && data.choices[0]) {
                resultDiv.innerText = data.choices[0].message.content;
                outputSection.style.display = 'block';
            } else if (data.error) {
                // กรณีเกิดข้อผิดพลาดที่ส่งมาจาก GAS
                throw new Error(`OpenAI Error: ${data.message || 'Unknown OpenAI Error'}`);
            } else {
                throw new Error("โครงสร้างข้อมูลจาก AI ไม่ถูกต้อง");
            }

        } catch (error) {
            console.error('Fetch error:', error);
            // ข้อความแจ้งเตือนผู้ใช้ในภาษาที่เข้าใจง่าย
            let userMessage = "เกิดข้อผิดพลาด: ไม่สามารถเชื่อมต่อกับ AI ได้";
            
            if (error.message.includes('CORS') || error.message.includes('Fetch')) {
                userMessage += "\n\nอาจเกิดจาก: \n1. ยังไม่ได้ Deploy Web App ของ GAS เป็น 'Anyone'\n2. URL ของ GAS ผิด\n\n(กรุณาตรวจสอบ Console ใน Developer Tools เพื่อดูรายละเอียด)";
            } else {
                userMessage += "\n\nรายละเอียด: " + error.message;
            }
            alert(userMessage);
        } finally {
            // 5. คืนสถานะ UI
            btn.disabled = false;
            btn.innerText = "🚀 เริ่มสร้างคำตอบด้วย AI";
            loading.style.display = 'none';
        }
    }

    // ฟังก์ชันคัดลอกผลลัพธ์ AI
    function copyResult() {
        const text = document.getElementById('result').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("📋 คัดลอกผลลัพธ์ AI เรียบร้อยแล้ว!");
        });
    }

    // ฟังก์ชันคัดลอกพรอมต์ต้นฉบับ
    function copyGeneratedPrompt() {
        if (!generatedPrompt) return;
        navigator.clipboard.writeText(generatedPrompt).then(() => {
            alert("🔗 คัดลอกพรอมต์ต้นฉบับเรียบร้อยแล้ว!\n(คุณสามารถนำไปใช้อ้างอิงหรือใช้กับ ChatGPT โดยตรง)");
        });
    }
</script>

</body>
</html>
